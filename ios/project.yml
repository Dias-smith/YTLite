name: YTLite
options:
  bundleIdPrefix: com.ytlite
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
packages:
  supabase-swift:
    url: https://github.com/supabase/supabase-swift
    from: 2.5.1
  firebase-ios-sdk:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.6.0
  google-mobile-ads:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: 12.0.0
targets:
  YTLite:
    type: application
    platform: iOS
    sources:
      - path: YTLite
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ytlite.player
        PRODUCT_NAME: YouLite
        INFOPLIST_FILE: YTLite/Info.plist
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: YTLite/YTLite.entitlements
        DEVELOPMENT_TEAM: ""
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited)"
        VALIDATE_PRODUCT: NO
        DEVELOPMENT_LANGUAGE: en
    entitlements:
      path: YTLite/YTLite.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    dependencies:
      - package: supabase-swift
        product: Supabase
      - package: firebase-ios-sdk
        product: FirebaseAnalytics
      - package: firebase-ios-sdk
        product: FirebaseCrashlytics
      - package: google-mobile-ads
        product: GoogleMobileAds
